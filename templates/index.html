<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaukriPro</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1><img src="/static/logo.png" alt="NaukriPro" style="height:36px; vertical-align:middle; margin-right:8px;">NaukriPro</h1>
    <p class="subtitle">Find jobs. Apply automatically. You just say GO.</p>

    <!-- Status Bar -->
    <div id="statusBar" class="status-bar status-idle">
      <span id="statusIcon">⏸</span>
      <span id="statusText">Ready</span>
      <button id="stopBtn" class="btn btn-danger btn-sm hidden" style="margin-left:auto;">⏹ Stop</button>
    </div>

    <!-- Simple Search Form -->
    <div id="configSection" class="card">
      <h2>🔍 What jobs are you looking for?</h2>
      <form id="configForm">
        <div class="form-grid">
          <div class="form-group full">
            <label>Job Titles</label>
            <input type="text" name="job_titles" required placeholder="e.g. Backend Developer, Python Developer">
          </div>
          <div class="form-group">
            <label>Location</label>
            <input type="text" name="location" required placeholder="e.g. Bangalore, Remote">
          </div>
          <div class="form-group">
            <label>Resume</label>
            <input type="file" name="resume" accept=".pdf,.docx,.doc" required>
          </div>
          <div class="form-group full">
            <label>Search on</label>
            <div class="checkbox-group">
              <label><input type="checkbox" name="boards" value="linkedin" checked> LinkedIn</label>
              <label><input type="checkbox" name="boards" value="naukri" checked> Naukri.com</label>
            </div>
          </div>
          <div class="form-group full">
            <div class="checkbox-group">
              <label><input type="checkbox" name="auto_apply" checked> ⚡ Auto-apply to all relevant jobs (no manual GO needed)</label>
            </div>
          </div>
        </div>
        <button type="submit" class="btn" style="margin-top:1rem; width:100%;">🚀 Sign In & Find Jobs</button>
      </form>
    </div>

    <!-- Sign-in status -->
    <div id="signinSection" class="card hidden">
      <h2>🔐 Sign in to your accounts</h2>
      <p style="color:var(--muted); margin-bottom:1rem;">A browser window will open. Sign in to your accounts, then click "Done" below.</p>
      <div id="signinStatus" style="margin-bottom:1rem;"></div>
      <button id="signinDoneBtn" class="btn btn-success">✅ I've signed in — Find Jobs</button>
    </div>

    <!-- Jobs List -->
    <div id="jobsSection" class="card hidden">
      <h2>🏆 Top Matches</h2>
      <table class="job-table">
        <thead>
          <tr>
            <th><input type="checkbox" id="selectAll"></th>
            <th>Score</th>
            <th>Title</th>
            <th>Company</th>
            <th>Location</th>
          </tr>
        </thead>
        <tbody id="jobsBody"></tbody>
      </table>
      <div style="margin-top:1rem; display:flex; gap:1rem;">
        <button id="applyBtn" class="btn" disabled>🚀 Apply to Selected</button>
        <span id="selectedCount" style="color:var(--muted); align-self:center;">0 selected</span>
      </div>
    </div>

    <!-- Live Log -->
    <div id="logSection" class="card hidden">
      <h2>📝 Progress</h2>
      <div id="logBox" class="log-box"></div>
      <div id="userInputSection" class="hidden" style="margin-top:1rem; display:flex; gap:0.5rem;">
        <input type="text" id="userInput" placeholder="Type your answer..." style="flex:1;">
        <button id="userInputBtn" class="btn btn-sm">Send</button>
      </div>
      <div id="confirmSection" class="hidden" style="margin-top:1rem; display:flex; gap:0.5rem;">
        <button id="goBtn" class="btn btn-success">✅ GO — Submit</button>
        <button id="skipBtn" class="btn btn-danger">⏭ SKIP</button>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    let eventSource = null;
    let searchController = null;

    const configForm = document.getElementById('configForm');
    const jobsSection = document.getElementById('jobsSection');
    const jobsBody = document.getElementById('jobsBody');
    const logSection = document.getElementById('logSection');
    const logBox = document.getElementById('logBox');
    const statusBar = document.getElementById('statusBar');
    const statusIcon = document.getElementById('statusIcon');
    const statusText = document.getElementById('statusText');
    const applyBtn = document.getElementById('applyBtn');
    const selectAll = document.getElementById('selectAll');
    const selectedCount = document.getElementById('selectedCount');
    const userInputSection = document.getElementById('userInputSection');
    const confirmSection = document.getElementById('confirmSection');
    const stopBtn = document.getElementById('stopBtn');

    function setStatus(type, text) {
      statusBar.className = 'status-bar status-' + type;
      statusIcon.textContent = type === 'done' ? '✅' : '⏸';
      if (type === 'running') statusIcon.innerHTML = '<div class="spinner"></div>';
      statusText.textContent = text;
      stopBtn.classList.toggle('hidden', type !== 'running');
    }

    function addLog(msg, type = 'info') {
      const p = document.createElement('p');
      p.className = 'log-' + type;
      p.textContent = msg;
      logBox.appendChild(p);
      logBox.scrollTop = logBox.scrollHeight;
    }

    // Search
    configForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(configForm);
      setStatus('running', 'Opening browser for sign-in...');

      // Step 1: Upload resume & trigger sign-in
      try {
        const resp = await fetch('/api/signin', { method: 'POST', body: formData });
        const data = await resp.json();
        if (data.error) { setStatus('idle', data.error); return; }

        // Show sign-in section
        configSection.classList.add('hidden');
        const signinSection = document.getElementById('signinSection');
        const signinStatus = document.getElementById('signinStatus');
        signinSection.classList.remove('hidden');

        const boards = formData.getAll('boards');
        let statusHtml = '';
        if (boards.includes('naukri')) statusHtml += '<p>→ Sign in to <strong>Naukri.com</strong> in the browser window</p>';
        if (boards.includes('linkedin')) statusHtml += '<p>→ Sign in to <strong>LinkedIn</strong> in the browser window</p>';
        signinStatus.innerHTML = statusHtml;

        setStatus('idle', 'Sign in to your accounts in the browser window');
      } catch (err) {
        setStatus('idle', err.message);
      }
    });

    // After sign-in done, search for jobs — stream them one by one
    document.getElementById('signinDoneBtn').addEventListener('click', async () => {
      setStatus('running', 'Searching for jobs...');
      document.getElementById('signinSection').classList.add('hidden');
      jobsSection.classList.remove('hidden');
      jobsBody.innerHTML = '';

      const evtSource = new EventSource('/api/search_stream');
      let jobCount = 0;
      let relevantCount = 0;

      evtSource.onmessage = (e) => {
        const d = JSON.parse(e.data);

        if (d.type === 'job') {
          jobCount++;
          const job = d.job;
          const i = d.index;
          const sc = job.score >= 75 ? 'score-high' : job.score >= 50 ? 'score-mid' : 'score-low';
          if (job.score >= 60) relevantCount++;
          jobsBody.innerHTML += `<tr>
            <td><input type="checkbox" class="job-check" data-index="${i}" ${job.score >= 60 ? 'checked' : ''}></td>
            <td><span class="score-badge ${sc}">${job.score}</span></td>
            <td>${job.title}</td>
            <td>${job.company}</td>
            <td>${job.location}</td>
          </tr>`;
          setStatus('running', `Found ${jobCount} jobs (${relevantCount} relevant)...`);
          updateSelectedCount();
        } else if (d.type === 'done') {
          evtSource.close();
          setStatus('idle', `${jobCount} jobs found — ${relevantCount} relevant (score ≥ 60)`);
          updateSelectedCount();
          if (d.auto_apply && relevantCount > 0) {
            applyBtn.click();
          }
        } else if (d.type === 'status') {
          setStatus('running', d.message);
        }
      };

      evtSource.onerror = () => {
        evtSource.close();
        setStatus('idle', `${jobCount} jobs found`);
      };
    });

    // Stop
    stopBtn.addEventListener('click', () => {
      if (searchController) { searchController.abort(); searchController = null; }
      if (eventSource) { eventSource.close(); eventSource = null; }
      fetch('/api/stop', { method: 'POST' });
      setStatus('idle', 'Stopped');
      userInputSection.classList.add('hidden');
      confirmSection.classList.add('hidden');
    });

    // Select
    selectAll.addEventListener('change', () => {
      document.querySelectorAll('.job-check').forEach(cb => cb.checked = selectAll.checked);
      updateSelectedCount();
    });
    document.addEventListener('change', (e) => { if (e.target.classList.contains('job-check')) updateSelectedCount(); });
    function updateSelectedCount() {
      const c = document.querySelectorAll('.job-check:checked').length;
      selectedCount.textContent = c + ' selected';
      applyBtn.disabled = c === 0;
    }

    // Apply
    applyBtn.addEventListener('click', () => {
      const indices = [];
      document.querySelectorAll('.job-check:checked').forEach(cb => indices.push(cb.dataset.index));
      logSection.classList.remove('hidden');
      logBox.innerHTML = '';
      setStatus('running', 'Applying...');

      eventSource = new EventSource('/api/apply?indices=' + indices.join(','));
      eventSource.onmessage = (e) => {
        const d = JSON.parse(e.data);
        if (d.type === 'log') addLog(d.message, d.level || 'info');
        else if (d.type === 'ask_user') { addLog('❓ ' + d.question, 'warning'); userInputSection.classList.remove('hidden'); document.getElementById('userInput').focus(); }
        else if (d.type === 'confirm') { addLog('⏸ ' + d.summary, 'warning'); confirmSection.classList.remove('hidden'); }
        else if (d.type === 'done') { setStatus('done', d.message); eventSource.close(); }
      };
      eventSource.onerror = () => { setStatus('idle', 'Connection lost'); eventSource.close(); };
    });

    // User responses
    function sendUserInput() {
      const inp = document.getElementById('userInput');
      if (!inp.value.trim()) return;
      fetch('/api/respond', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({answer: inp.value.trim()}) });
      addLog('→ ' + inp.value.trim(), 'success');
      inp.value = '';
      userInputSection.classList.add('hidden');
    }
    document.getElementById('userInputBtn').addEventListener('click', sendUserInput);
    document.getElementById('userInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendUserInput(); });
    document.getElementById('goBtn').addEventListener('click', () => { fetch('/api/respond', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({answer:'GO'})}); addLog('→ GO','success'); confirmSection.classList.add('hidden'); });
    document.getElementById('skipBtn').addEventListener('click', () => { fetch('/api/respond', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({answer:'SKIP'})}); addLog('→ SKIP','warning'); confirmSection.classList.add('hidden'); });
  </script>
</body>
</html>
